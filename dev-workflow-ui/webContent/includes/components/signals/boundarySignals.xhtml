<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:c="jakarta.tags.core" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions"
  xmlns:jc="jakarta.faces.composite/components">

  <p:dataTable id="boundarySignalsTable" var="receiver" value="#{signalsBean.boundarySignalModel}" lazy="true"
    emptyMessage="#{ivy.cm.co('/signals/noSignalsFound')}"
    rows="5" paginator="true" paginatorPosition="bottom" paginatorAlwaysVisible="false">
    <p:column headerText="#{ivy.cm.co('/signals/signalPattern')}" sortBy="#{receiver.signalPattern}" sortOrder="ascending">
      <h:outputText value="#{receiver.signalPattern}" />
    </p:column>
    <p:column headerText="#{ivy.cm.co('/signals/waitingTask')}" sortBy="#{receiver.waitingTask}">
      <jc:taskLink task="#{receiver.waitingTask}" id="waitingTask" />
    </p:column>
    <p:column styleClass="table-btn-1">
      <p:commandButton id="sendSignalIcon" actionListener="#{signalsBean.sendBoundarySignal(receiver.signalPattern)}"
        update="signalForm, firedSignalsTable, boundarySignalsTable"
        icon="ti ti-mail" styleClass="ui-button-outlined rounded-button" />
      <p:tooltip for="sendSignalIcon" value="Send this signal" position="top"/>
    </p:column>
  </p:dataTable>

</ui:composition>
