<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:c="jakarta.tags.core" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions">

  <ul class="custom-list">
    <h:form id="documentsDownloadForm">
      <ui:repeat var="document" value="#{casesDetailsBean.documents}">
        <li class="document-entry" style="list-style-type: none;">
          <span class="mr-1 ti ti-#{document.icon}"/>
          <h:commandLink value="#{document.name}">
            <p:fileDownload value="#{document.streamedContent}"></p:fileDownload>
          </h:commandLink>
        </li>
      </ui:repeat>
    </h:form>
  </ul>
  <c:if test="#{empty casesDetailsBean.documents}">
    <h:outputText value="#{ivy.cm.co('/common/noDocumentsFound')}" />
  </c:if>

</ui:composition>
