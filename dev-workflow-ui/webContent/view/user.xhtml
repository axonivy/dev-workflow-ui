<html xmlns="http://www.w3.org/1999/xhtml"
  xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html"
  xmlns:ui="jakarta.faces.facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui"
  xmlns:pe="http://primefaces.org/ui/extensions"
  xmlns:c="jakarta.tags.core"
  xmlns:jc="jakarta.faces.composite/components"
  xmlns:jsf="jakarta.faces">

<f:metadata>
  <f:viewParam name="userId" value="#{userDetailBean.userId}" />
</f:metadata>

<h:body>

  <ui:composition template="../includes/template/template.xhtml">
    <ui:define name="content">
      <div class="layout-dashboard">
        <div class="grid">
          <div class="col-6">
            <div class="card">
              <div class="card-header">
                <div class="card-title flex align-items-center">
                  <i class="pr-3 ti ti-file-text"></i>
                  <h6 class="m-0">#{ivy.cm.co('/common/description')}</h6>
                </div>
              </div>
              <ui:include src="/includes/components/userDetails/userdetail-information.xhtml" />
            </div>
          </div>
          <div class="col-6">
            <div class="card">
              <div class="card-header">
                <div class="card-title flex align-items-center">
                  <i class="pr-3 ti ti-users"></i>
                  <h6 class="m-0">#{ivy.cm.co('/common/roles')}</h6>
                </div>
              </div>
              <ui:include src="/includes/components/userDetails/userdetail-roles.xhtml" />
            </div>
          </div>
          <div class="col-12">
            <div class="card">
              <div class="card-header">
                <div class="card-title flex align-items-center">
                  <i class="pr-3 ti ti-list"></i>
                  <h6 class="m-0">#{ivy.cm.co('/common/openTasks')}</h6>
                </div>
              </div>
              <ui:include src="/includes/components/userDetails/userdetail-usertasks.xhtml" />
            </div>
          </div>
          <div class="col-12">
            <div class="card">
              <div class="card-header">
                <div class="card-title flex align-items-center">
                  <i class="pr-3 ti ti-info-circle"></i>
                  <h6 class="m-0">#{ivy.cm.co('/common/startedCases')}</h6>
                </div>
              </div>
              <ui:include src="/includes/components/userDetails/userdetail-usercases.xhtml" />
            </div>
          </div>
        </div>
      </div>
    </ui:define>
  </ui:composition>
</h:body>
</html>
