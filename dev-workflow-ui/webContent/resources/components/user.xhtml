<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:cc="jakarta.faces.composite" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions">
<cc:interface>
  <cc:attribute name="user" />
</cc:interface>

<cc:implementation>
  <ui:param name="userModel" value="#{userComponentBean.toComponentModel(cc.attrs.user)}" />
  <h:panelGroup styleClass="flex align-items-center">
    <h:panelGroup rendered="#{not empty userModel.name}">
      <i class="mr-1 text-xl #{userModel.cssIcon}" />
    </h:panelGroup>

    <h:panelGroup rendered="#{userModel.getShowUserDetailLink()}">
      <p:link id="userNameLink" value="#{userModel.name}" href="#{userModel.getDetailLinkUrl()}"/>
    </h:panelGroup>

    <h:panelGroup rendered="#{!userModel.getShowUserDetailLink()}">
      <h:outputText id="userName" value="#{userModel.name}" />
    </h:panelGroup>
  </h:panelGroup>
</cc:implementation>
</html>
