<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:cc="jakarta.faces.composite" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions"
  xmlns:jc="jakarta.faces.composite/components">
<cc:interface>
  <cc:attribute name="task" />
</cc:interface>

<cc:implementation>
  <ui:param name="task" value="#{tasksBean.toTaskLinkModel(cc.attrs.task)}"/>
  <h:link outcome="task" styleClass="flex align-items-center">
    <f:param name="id" value="#{task.uuid}"/>
    <i class="ti ti-checklist ml-2" />
    <h:outputText id="taskLink" value="#{task.name}" styleClass="ml-2"/>
    <p:tooltip for="taskLink" position="top">
      <h:panelGroup layout="block" styleClass="py-2">
        <h:outputText value="#{ivy.cm.co('/common/id')}: #{task.uuid}"/><br/>
        #{ivy.cm.co('/common/state')}: <jc:stateBadge id="taskState" data="#{cc.attrs.task}"/>
      </h:panelGroup>
    </p:tooltip>
  </h:link>
</cc:implementation>
</html>
