<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:cc="http://xmlns.jcp.org/jsf/composite" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions"
  xmlns:jc="http://xmlns.jcp.org/jsf/composite/components">
<cc:interface>
  <cc:attribute name="case" />
</cc:interface>

<cc:implementation>
  <h:link styleClass="case-link flex align-items-center" outcome="case">
    <f:param name="id" value="#{cc.attrs.case.uuid()}"/>
    <jc:stateBadge id="caseState" state="#{cc.attrs.case.businessState}" />
    <h:outputText id="caseLink" value="#{casesIvyDevWfBean.getName(cc.attrs.case)}" styleClass="ml-2"/>
    <p:tooltip for="caseLink" value="Case #{cc.attrs.case.uuid()}" position="top"/>
  </h:link>
</cc:implementation>
</html>
